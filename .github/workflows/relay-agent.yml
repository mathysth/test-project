name: Relay agent
run-name: relay-${{ inputs.run_id }}
on:
  workflow_dispatch:
    inputs:
      run_id:         { required: true }
      provider:       { required: true }
      branch:         { required: true }
      title:          { required: true }
      task:           { required: true }
      model:          { required: true }
      max_turns:      { required: true }
      timeout_minutes: { required: true }
permissions:
  contents: write
jobs:
  agent:
    runs-on: ubuntu-latest
    # workflow_dispatch inputs arrive as strings; timeout-minutes needs a number.
    # fromJSON("20") -> 20, which GitHub's workflow validator accepts (a bare
    # ${{ inputs.timeout_minutes }} is a string and fails parse: "workflow file issue").
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    steps:
      - uses: actions/checkout@v4
      # User inputs are passed via env and referenced as shell vars, never
      # interpolated directly into run: scripts.
      - name: Create or continue branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH" 2>/dev/null && git checkout "$BRANCH" || git checkout -b "$BRANCH"
      - name: Write task
        env:
          TASK: ${{ inputs.task }}
        run: printf '%s' "$TASK" > /tmp/relay-task.md
      - name: Code (Claude)
        if: inputs.provider == 'anthropic'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: ${{ inputs.model }}
          MAX_TURNS: ${{ inputs.max_turns }}
        run: npx -y @anthropic-ai/claude-code -p "$(cat /tmp/relay-task.md)" --permission-mode acceptEdits --model "$MODEL" --max-turns "$MAX_TURNS" --output-format json > /tmp/relay-claude.json
      - name: Code (Codex)
        if: inputs.provider == 'openai'
        env:
          # Codex CLI reads CODEX_API_KEY (NOT OPENAI_API_KEY) for non-interactive
          # api-key auth; with OPENAI_API_KEY it tries ChatGPT OAuth and 401s in CI.
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: ${{ inputs.model }}
        run: npx -y @openai/codex exec --json -m "$MODEL" "$(cat /tmp/relay-task.md)" > /tmp/relay-codex.json
      # Normalize whichever provider's output exists into relay-usage.json.
      - name: Normalize usage
        if: always()
        env:
          PROVIDER: ${{ inputs.provider }}
          MODEL: ${{ inputs.model }}
        run: |
          cat > /tmp/normalize.mjs <<'EOF'
          import fs from 'node:fs';
          const read = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; } };
          const out = { provider: process.env.PROVIDER, model: process.env.MODEL, inputTokens: 0, outputTokens: 0, cacheReadTokens: 0, cacheCreationTokens: 0, turns: 0, durationMs: 0, costUsd: 0 };
          const c = read('/tmp/relay-claude.json');
          if (c) {
            const u = c.usage || {};
            out.inputTokens = u.input_tokens || 0;
            out.outputTokens = u.output_tokens || 0;
            out.cacheReadTokens = u.cache_read_input_tokens || 0;
            out.cacheCreationTokens = u.cache_creation_input_tokens || 0;
            out.turns = c.num_turns || 0;
            out.durationMs = c.duration_ms || 0;
            out.costUsd = c.total_cost_usd || 0;
          }
          const o = read('/tmp/relay-codex.json');
          if (o) {
            const u = o.usage || o.token_usage || {};
            out.inputTokens = u.input_tokens || u.prompt_tokens || 0;
            out.outputTokens = u.output_tokens || u.completion_tokens || 0;
          }
          fs.writeFileSync('/tmp/relay-usage.json', JSON.stringify(out));
          EOF
          node /tmp/normalize.mjs
          cat /tmp/relay-usage.json
      - name: Upload usage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relay-usage
          path: /tmp/relay-usage.json
          if-no-files-found: ignore
      # Push only — Relay opens the PR with the user's OAuth token afterwards.
      # if: always() so partial work survives a failing agent step (e.g. the
      # turn cap is hit mid-task): the branch is pushed and a re-run continues it.
      - name: Commit and push
        if: always()
        env:
          BRANCH: ${{ inputs.branch }}
          TITLE: ${{ inputs.title }}
        run: |
          git config user.name "relay-agent"
          git config user.email "agent@relay.dev"
          git add -A
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "$TITLE"
          git push -u origin "$BRANCH"
